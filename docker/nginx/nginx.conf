# Production-Grade NGINX Edge Configuration
# Single reverse proxy entry point for all service traffic
# Handles routing, security, timeouts, health checks, and observability

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
  use epoll;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  # Logging format with request tracing
  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for"';

  access_log /var/log/nginx/access.log main;

  # Core performance settings
  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  types_hash_max_size 2048;
  client_max_body_size 100M;

  # Gzip compression for response bodies
  gzip on;
  gzip_vary on;
  gzip_min_length 1000;
  gzip_types text/plain text/css text/xml text/javascript
             application/x-javascript application/xml+rss
             application/javascript application/json;

  # Rate limiting zones (can be extended for per-endpoint limits)
  limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
  limit_req_zone $binary_remote_addr zone=web_limit:10m rate=100r/s;

  # ============================================================
  # UPSTREAM BLOCKS - Decoupled service routing
  # Enables load balancing, canary deployments, failover
  # ============================================================

  upstream web_backend {
    # Docker service name resolution (will resolve in docker network)
    server web:3000;

    # Keepalive connections to reduce overhead
    keepalive 32;
  }

  upstream api_backend {
    # API can be embedded in web service or separate
    # This allows flexible routing without config changes
    server web:3000;  # Currently embedded in Next.js
    # server api:3001;  # Uncomment when API extracted to separate service

    keepalive 32;
  }

  # ============================================================
  # MAIN SERVER BLOCK - Default gateway
  # ============================================================

  server {
    listen ${GATEWAY_PORT:-80} default_server;
    listen [::]:${GATEWAY_PORT:-80} default_server ipv6only=on;

    server_name _;

    # Security headers - prevents browser-based exploits
    add_header X-Frame-Options "${SECURITY_FRAME_OPTIONS:-SAMEORIGIN}" always;
    add_header X-Content-Type-Options "${SECURITY_CONTENT_TYPE_OPTIONS:-nosniff}" always;
    add_header X-XSS-Protection "${SECURITY_XSS_PROTECTION:-1; mode=block}" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # ============================================================
    # HEALTH ENDPOINT - Edge-level health monitoring
    # Called by load balancers, orchestrators, monitoring systems
    # ============================================================

    location = /health {
      access_log off;
      default_type application/json;
      return 200 '{"status":"ok","timestamp":"$date_gmt"}';
    }

    location = /health/live {
      access_log off;
      return 200 "ok";
    }

    location = /health/ready {
      access_log off;
      # Proxy upstream health check
      proxy_pass http://web_backend/api/health;
      proxy_connect_timeout 2s;
      proxy_read_timeout 5s;
      proxy_send_timeout 5s;
    }

    # ============================================================
    # API ENDPOINT ROUTING
    # Must-do: Path rewriting prevents ambiguous routing
    # ============================================================

    location /api/ {
      # Temporarily disabled rate limiting for testing
      # limit_req zone=api_limit burst=20 nodelay;

      # NOTE: No rewrite needed - API is embedded in Next.js which serves
      # routes at /api/... natively. Pass the request through as-is.

      # Upstream service
      proxy_pass http://api_backend;

      # ============================================================
      # MUST-DO: TIMEOUTS - Prevent hanging connections
      # ============================================================

      # Time to establish connection to upstream service
      proxy_connect_timeout ${API_CONNECT_TIMEOUT:-5s};

      # Time waiting for upstream response to complete
      proxy_send_timeout ${API_SEND_TIMEOUT:-10s};

      # Time for upstream to send response data
      proxy_read_timeout ${API_READ_TIMEOUT:-10s};

      # ============================================================
      # PROXY HEADERS - Maintain request metadata
      # ============================================================

      # Forward client IP (preserves real client for logging/security)
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $server_name;
      proxy_set_header X-Forwarded-Port $server_port;

      # Forward original host (for virtual hosting)
      proxy_set_header Host $host;

      # CRITICAL: Forward Authorization header (JWT tokens, etc)
      proxy_set_header Authorization $http_authorization;

      # Correlation ID for distributed tracing
      proxy_set_header X-Request-ID $request_id;

      # HTTP version for connection management
      proxy_http_version 1.1;
      proxy_set_header Connection "";

      # Buffering settings (balanced for latency vs throughput)
      proxy_buffering on;
      proxy_buffer_size 4k;
      proxy_buffers 8 4k;
      proxy_busy_buffers_size 8k;
    }

    # ============================================================
    # WEB ENDPOINT ROUTING
    # Routes to frontend application
    # ============================================================

    # WebSocket support for Next.js HMR in dev mode
    location /_next/webpack-hmr {
      proxy_pass http://web_backend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_read_timeout 3600s;
    }

    location / {
      # Temporarily disabled rate limiting for testing
      # limit_req zone=web_limit burst=100 nodelay;

      # NO rewrite needed for web - serve as-is
      proxy_pass http://web_backend;

      # Timeouts for web service (more lenient than API)
      proxy_connect_timeout ${WEB_CONNECT_TIMEOUT:-5s};
      proxy_send_timeout ${WEB_SEND_TIMEOUT:-10s};
      proxy_read_timeout ${WEB_READ_TIMEOUT:-10s};

      # Preserve request metadata
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $server_name;
      proxy_set_header X-Forwarded-Port $server_port;
      proxy_set_header Host $host;
      proxy_set_header X-Request-ID $request_id;

      # CRITICAL: Forward Authorization header (JWT tokens, etc)
      proxy_set_header Authorization $http_authorization;

      # HTTP/1.1 for keep-alive
      proxy_http_version 1.1;
      proxy_set_header Connection "";

      # Buffering for frontend assets (html, css, js)
      proxy_buffering on;
      proxy_buffer_size 4k;
      proxy_buffers 8 4k;
      proxy_busy_buffers_size 8k;

      # Cache headers for static assets
      proxy_cache_bypass $http_pragma $http_authorization;
      add_header X-Cache-Status $upstream_cache_status;
    }

    # ============================================================
    # STATIC ASSET CACHING (Optional optimization)
    # ============================================================

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
      proxy_pass http://web_backend;
      proxy_cache_valid 200 30d;
      add_header Cache-Control "public, immutable, max-age=2592000";
      access_log off;
    }

    # ============================================================
    # ERROR HANDLING
    # ============================================================

    error_page 502 503 504 /50x.html;
    location = /50x.html {
      root /usr/share/nginx/html;
    }
  }

  # ============================================================
  # KUBERNETES READINESS (for future K8s deployment)
  # ============================================================

  server {
    listen 8081;
    server_name _;

    location /metrics {
      return 404;  # Placeholder for Prometheus metrics
    }

    location /ready {
      access_log off;
      return 200 "ready\n";
    }
  }
}
