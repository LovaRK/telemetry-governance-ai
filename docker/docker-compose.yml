services:
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    ports:
      - "${WEB_PORT:-3002}:3000"  # HOST:CONTAINER - mapped from .env WEB_PORT
    environment:
      - DATABASE_URL=postgresql://telemetry:telemetry@postgres:5432/telemetry_os
      - NODE_ENV=development
      - APP_ENV=${APP_ENV:-sandbox}
      - NODE_TLS_REJECT_UNAUTHORIZED=0
      - NEXT_PUBLIC_SPLUNK_MCP_URL=https://144.202.48.85:8089
      - NEXT_PUBLIC_SPLUNK_TOKEN=Basic cmFtOlJhbWFAMTk4OA==
      - NEXT_PUBLIC_SPLUNK_DISABLE_SSL_VERIFY=true
      - LLM_MODEL=gemma2:9b
      - WEB_PORT=${WEB_PORT:-3002}  # Pass to container for health checks
      - GOVERNANCE_BOOTSTRAP_KEY=75512d550a46fc514ca7874ba7fee1244f39303d99a782e82cbcfd2097ee03cd
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@bitso.com}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-Admin@12345}
      - SPLUNK_SECRET_ENCRYPTION_KEY=${SPLUNK_SECRET_ENCRYPTION_KEY:?Must set SPLUNK_SECRET_ENCRYPTION_KEY}
    volumes:
      - ../apps/web:/app/apps/web  # Hot-reload: Next.js app
      - ../packages:/app/packages  # Hot-reload: shared auth/types packages
      - ../core:/app/core          # Hot-reload: DB connection, guards (set_config lives here)
      - ../apps/api:/app/apps/api  # Hot-reload: API services
      - /app/apps/web/.next        # Exclude .next build cache from mount (use container version)
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health >/dev/null || exit 1"]
      interval: ${HEALTH_CHECK_INTERVAL:-10s}
      timeout: ${HEALTH_CHECK_TIMEOUT:-5s}
      retries: ${HEALTH_CHECK_RETRIES:-5}
      start_period: 30s
    extra_hosts:
      - "host.docker.internal:host-gateway"

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    environment:
      - DATABASE_URL=postgresql://telemetry:telemetry@postgres:5432/telemetry_os
      - APP_ENV=${APP_ENV:-sandbox}
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - NODE_TLS_REJECT_UNAUTHORIZED=0
      - LLM_MODEL=gemma2:9b
      - WORKER_POLL_INTERVAL_MS=5000
      - WORKER_BATCH_TIMEOUT_MS=${WORKER_BATCH_TIMEOUT_MS:-240000}
      - LLM_BATCH_TIMEOUT=${LLM_BATCH_TIMEOUT:-60}
    depends_on:
      postgres:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    ports:
      - "${POSTGRES_PORT:-5433}:5432"  # HOST:CONTAINER - mapped from .env POSTGRES_PORT
    environment:
      - POSTGRES_USER=telemetry
      - POSTGRES_PASSWORD=telemetry
      - POSTGRES_DB=telemetry_os
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U telemetry -d telemetry_os"]
      interval: ${HEALTH_CHECK_INTERVAL:-10s}
      timeout: ${HEALTH_CHECK_TIMEOUT:-5s}
      retries: ${HEALTH_CHECK_RETRIES:-5}
      start_period: 15s

volumes:
  postgres_data:
