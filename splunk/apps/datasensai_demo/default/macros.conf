[datasensai_volume_search]
definition = search index="datasensai_internal_sim" datasensai_synthetic=true
description = Search fragment for volume metadata in demo mode. Stores customer index in idx field. Production: index="_internal" source="*license_usage.log" type="Usage"

[datasensai_audit_search]
definition = search index="datasensai_audit_sim" datasensai_synthetic=true action="search"
description = Search fragment for audit activity in demo mode. Production: index="_audit" action="search"

[datasensai_customer_search]
definition = search (index="dsdemo_oswin" OR index="dsdemo_apptomcat" OR index="dsdemo_appapache" OR index="dsdemo_osnix" OR index="dsdemo_netfw" OR index="dsdemo_wazuh_alerts" OR index="dsdemo_appengine" OR index="dsdemo_aws_logs" OR index="dsdemo_applogstash" OR index="dsdemo_appsplunkinternal" OR index="dsdemo_appjava" OR index="dsdemo_appdatabase" OR index="dsdemo_appfirehose" OR index="dsdemo_applocalhost" OR index="dsdemo_appserver" OR index="dsdemo_appsyslog" OR index="dsdemo_appsyslogng" OR index="dsdemo_appxml") datasensai_synthetic=true
description = Customer index allowlist (prefixed dsdemo_*) to prevent accidental deletion of real indexes. Avoids index=* which matches system indexes. Production: real customer index patterns

[datasensai_volume_field]
definition = "GB_idx_st_s"
description = Volume field name. Demo: GB_idx_st_s (from synthetic data). Production: gb (from _internal)

[datasensai_idx_field]
definition = "idx"
description = Logical customer index field (stored in events for all three data types). Always use idx for grouping/display, not physical index name.

[datasensai_run_id_filter]
definition = datasensai_run_id="$DATASENSAI_RUN_ID$"
description = CRITICAL: Filter by explicit run_id to prevent duplicate-load data corruption. Must be set via DATASENSAI_RUN_ID environment variable. Without this filter, second load with same data doubles metrics.

[datasensai_synthetic_filter]
definition = datasensai_synthetic=true
description = Filter to synthetic demo data only. Never use in production queries.
