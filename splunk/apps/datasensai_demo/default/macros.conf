[datasensai_volume_search]
definition = search index=datasensai_internal_sim datasensai_synthetic=true
description = Search fragment for volume metadata in demo mode. Production: index=_internal source=*license_usage.log type=Usage

[datasensai_audit_search]
definition = search index=datasensai_audit_sim datasensai_synthetic=true action=search
description = Search fragment for audit activity in demo mode. Production: index=_audit action=search

[datasensai_customer_search]
definition = search (index=oswin OR index=apptomcat OR index=appapache OR index=osnix OR index=netfw OR index=wazuh-alerts OR index=appengine OR index=aws_logs OR index=applogstash OR index=appsplunkinternal OR index=appjava OR index=appdatabase OR index=appfirehose OR index=applocalhost OR index=appserver OR index=appsyslog OR index=appsyslogng OR index=appxml) datasensai_synthetic=true
description = Customer index allowlist from CSV. Avoids index=* which matches system indexes.

[datasensai_volume_field]
definition = GB_idx_st_s
description = Volume field name. Demo: GB_idx_st_s (from CSV). Production: gb (from _internal).

[datasensai_run_id_filter]
definition = datasensai_run_id="$DATASENSAI_RUN_ID$"
description = Filter by explicit run_id to prevent duplicate-load data corruption. CRITICAL: must be set via environment variable.

[datasensai_synthetic_filter]
definition = datasensai_synthetic=true
description = Filter to demo data only. Never query production with this.
