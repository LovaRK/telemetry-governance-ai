[datasensai - Daily License Usage by Index]
search = `datasensai_volume_search` `datasensai_run_id_filter` \
| stats sum(`datasensai_volume_field()`) as daily_gb by index \
| sort - daily_gb
description = Total daily volume by index
dispatch.earliest_time = -30d
dispatch.latest_time = now
action.email.sendresults = 0

[datasensai - Daily License Usage by Sourcetype]
search = `datasensai_volume_search` `datasensai_run_id_filter` \
| stats sum(`datasensai_volume_field()`) as daily_gb by sourcetype \
| sort - daily_gb
description = Total daily volume by sourcetype
dispatch.earliest_time = -30d
dispatch.latest_time = now

[datasensai - Search Utilization by Sourcetype]
search = `datasensai_volume_search` `datasensai_run_id_filter` \
| stats sum(`datasensai_volume_field()`) as daily_gb by sourcetype \
| join type=left sourcetype [ \
    search `datasensai_audit_search` `datasensai_run_id_filter` \
    | stats count as search_count latest(_time) as last_search_time by sourcetype_accessed \
    | rename sourcetype_accessed as sourcetype \
] \
| fillnull value=0 search_count \
| eval utilization_score=case( \
    search_count=0, 0, \
    search_count<5, 25, \
    search_count<15, 60, \
    true(), 100 \
) \
| sort - daily_gb
description = Volume and search activity combined. Includes zero-search sourcetypes via left-join.
dispatch.earliest_time = -30d
dispatch.latest_time = now

[datasensai - High Volume Low Search Coverage]
search = `datasensai_volume_search` `datasensai_run_id_filter` \
| stats sum(`datasensai_volume_field()`) as daily_gb by sourcetype \
| join type=left sourcetype [ \
    search `datasensai_audit_search` `datasensai_run_id_filter` \
    | stats count as search_count by sourcetype_accessed \
    | rename sourcetype_accessed as sourcetype \
] \
| fillnull value=0 search_count \
| where daily_gb > 0.5 AND search_count < 5 \
| sort - daily_gb
description = Sourcetypes with >0.5 GB daily volume but <5 searches. Optimization candidates.
dispatch.earliest_time = -30d
dispatch.latest_time = now

[datasensai - Executive Telemetry Value Summary]
search = `datasensai_volume_search` `datasensai_run_id_filter` \
| stats sum(`datasensai_volume_field()`) as total_daily_gb, count(distinct sourcetype) as sourcetype_count, count(distinct index) as index_count \
| eval total_daily_gb=round(total_daily_gb, 2)
description = KPIs: total GB, index count, sourcetype count
dispatch.earliest_time = -30d
dispatch.latest_time = now
