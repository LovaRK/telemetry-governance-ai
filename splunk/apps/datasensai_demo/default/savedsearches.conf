[datasensai - Daily License Usage by Index]
search = `datasensai_volume_search` `datasensai_run_id_filter` \
| stats sum(`datasensai_volume_field()`) as daily_gb by `datasensai_idx_field` \
| rename `datasensai_idx_field` as index \
| sort - daily_gb
description = Total daily volume by customer index (logical idx field, not physical)
dispatch.earliest_time = -30d
dispatch.latest_time = now
action.email.sendresults = 0

[datasensai - Daily License Usage by Sourcetype]
search = `datasensai_volume_search` `datasensai_run_id_filter` \
| stats sum(`datasensai_volume_field()`) as daily_gb by sourcetype \
| sort - daily_gb
description = Total daily volume by sourcetype
dispatch.earliest_time = -30d
dispatch.latest_time = now

[datasensai - Search Utilization by Sourcetype]
search = `datasensai_volume_search` `datasensai_run_id_filter` \
| stats sum(`datasensai_volume_field()`) as daily_gb by `datasensai_idx_field` sourcetype \
| join type=left `datasensai_idx_field` sourcetype [ \
    search `datasensai_audit_search` `datasensai_run_id_filter` \
    | stats count as search_count latest(_time) as last_search_time by index_accessed sourcetype_accessed \
    | rename index_accessed as `datasensai_idx_field` sourcetype_accessed as sourcetype \
] \
| fillnull value=0 search_count \
| eval utilization_score=case( \
    search_count=0, 0, \
    search_count<5, 25, \
    search_count<15, 60, \
    true(), 100 \
) \
| sort - daily_gb
description = Volume and search activity by idx+sourcetype. Left-join ensures zero-search sourcetypes included. CRITICAL: joins on idx+sourcetype, not just sourcetype.
dispatch.earliest_time = -30d
dispatch.latest_time = now

[datasensai - High Volume Low Search Coverage]
search = `datasensai_volume_search` `datasensai_run_id_filter` \
| stats sum(`datasensai_volume_field()`) as daily_gb by `datasensai_idx_field` sourcetype \
| join type=left `datasensai_idx_field` sourcetype [ \
    search `datasensai_audit_search` `datasensai_run_id_filter` \
    | stats count as search_count by index_accessed sourcetype_accessed \
    | rename index_accessed as `datasensai_idx_field` sourcetype_accessed as sourcetype \
] \
| fillnull value=0 search_count \
| where daily_gb > 0.5 AND search_count < 5 \
| sort - daily_gb
description = Indexes+sourcetypes with >0.5 GB daily but <5 searches. Optimization candidates (high volume, low utilization).
dispatch.earliest_time = -30d
dispatch.latest_time = now

[datasensai - Executive Telemetry Value Summary]
search = `datasensai_volume_search` `datasensai_run_id_filter` \
| stats sum(`datasensai_volume_field()`) as total_daily_gb, count(distinct sourcetype) as sourcetype_count, count(distinct `datasensai_idx_field`) as index_count \
| eval total_daily_gb=round(total_daily_gb, 2)
description = KPIs: total daily GB, sourcetype count, customer index count. Uses logical idx field, not physical index.
dispatch.earliest_time = -30d
dispatch.latest_time = now
